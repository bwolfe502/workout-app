<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F4F0E8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LIFT">
  <title>{% block title %}LIFT{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('home') }}">Lift</a>
    <nav class="nav-scroll" aria-label="Primary">
      <a href="{{ url_for('home') }}">Today</a>
      <a href="{{ url_for('program') }}">Program</a>
      <a href="{{ url_for('sessions') }}">Log</a>
      <a href="{{ url_for('metrics') }}">Body</a>
      <a href="{{ url_for('issues_list') }}">Notes</a>
      <a href="{{ url_for('stats') }}">Stats</a>
      <a href="{{ url_for('claude_review') }}">Review</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

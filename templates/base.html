<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LIFT">
  <title>{% block title %}LIFT — workout-app{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Geist+Mono:wght@400;500;600&display=swap">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-mark">LIFT</span>
      <span class="brand-dot" aria-hidden="true"></span>
    </a>
    <nav class="nav-scroll" aria-label="Primary">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('program') }}">Program</a>
      <a href="{{ url_for('sessions') }}">Sessions</a>
      <a href="{{ url_for('metrics') }}">Metrics</a>
      <a href="{{ url_for('issues_list') }}">Issues</a>
      <a href="{{ url_for('stats') }}">Stats</a>
      <a href="{{ url_for('claude_review') }}">Claude</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>

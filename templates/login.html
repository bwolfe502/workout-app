<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0B">
  <title>LIFT — sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Schibsted+Grotesk:wght@400;500;700&family=Geist+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <main>
    <div class="login-shell">
      <div class="lock-mark">L</div>
      <h1>Locked</h1>
      <p class="login-sub">Single-user · cookie sticks 1 yr</p>

      <form method="post" action="{{ url_for('login_submit') }}" class="login-card">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label for="password">Password
          <input id="password" name="password" type="password" required autofocus
                 autocomplete="current-password" inputmode="text">
        </label>
        {% if error %}
          <p class="login-error">{{ error }}</p>
        {% endif %}
        <button class="btn btn-primary btn-block mt-4" type="submit">Sign in</button>
      </form>
    </div>
  </main>
</body>
</html>
